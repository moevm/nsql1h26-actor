<article class="profile-card">
  <img class="profile-card__image" [src]="resolvedImageSrc" [alt]="resolvedImageAlt" />

  <div class="profile-card__content">
    <h3 class="profile-card__name">{{ resolvedFullName }}</h3>
    <p class="profile-card__age">{{ resolvedAge }}</p>
    <p class="profile-card__education">{{ resolvedEducation }}</p>
  </div>
</article>
